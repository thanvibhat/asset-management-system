<div class="chatbot-container">
  <!-- Floating Action Button -->
  <button class="chat-fab" (click)="toggleChat()" [title]="isOpen ? 'Close Assistant' : 'AI Assistant'">
    <svg *ngIf="!isOpen" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
    </svg>
    <svg *ngIf="isOpen" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="18" y1="6" x2="6" y2="18"></line>
      <line x1="6" y1="6" x2="18" y2="18"></line>
    </svg>
  </button>

  <!-- Chat Window -->
  <div class="chat-window" *ngIf="isOpen">
    <div class="chat-header">
      <div class="header-info">
        <div class="bot-avatar">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2zm0 18a8 8 0 1 1 8-8 8 8 0 0 1-8 8z"></path>
            <path d="M12 6v6l4 2"></path>
          </svg>
        </div>
        <div class="header-title">
          <h3>AI Asset Analyst</h3>
          <span>Powered by Gemini 2.0</span>
        </div>
      </div>
      <button class="close-btn" (click)="toggleChat()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M6 9l6 6 6-6"></path>
        </svg>
      </button>
    </div>

    <div class="chat-body" #chatBody>
      <div *ngFor="let msg of messages" class="message" [ngClass]="msg.type">
        {{ msg.text }}
        
        <!-- Suggestions/Actions for Bot Messages -->
        <div *ngIf="msg.type === 'bot' && msg.suggestions" class="suggestions">
          <button *ngFor="let s of msg.suggestions" class="suggestion-pill" (click)="useSuggestion(s)">
            {{ s }}
          </button>
        </div>
        
        <div *ngIf="msg.type === 'bot' && msg.showReportAction" class="report-actions">
          <button class="btn-report" (click)="downloadReport()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
              <polyline points="7 10 12 15 17 10"></polyline>
              <line x1="12" y1="15" x2="12" y2="3"></line>
            </svg>
            Download Executive Report
          </button>
        </div>
      </div>

      <!-- Typing Indicator -->
      <div class="typing" *ngIf="isLoading">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    </div>

    <div class="chat-input-area">
      <input 
        type="text" 
        class="chat-input" 
        placeholder="Type a question..." 
        [(ngModel)]="userInput"
        (keyup.enter)="sendMessage()"
        [disabled]="isLoading"
      >
      <button class="send-btn" (click)="sendMessage()" [disabled]="isLoading || !userInput.trim()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
  </div>
</div>
