<div class="login-page">
  <div class="login-card">
    <div class="brand">
      <div class="brand-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          <polyline points="9 22 9 12 15 12 15 22" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div>
        <h1 class="brand-name">AssetIQ</h1>
        <p class="brand-tagline">Enterprise Asset Management</p>
      </div>
    </div>

    <div class="login-form-section">
      <h2>Welcome back</h2>
      <p class="subtitle">Sign in to manage your organization's assets</p>

      <div *ngIf="error" class="alert alert-error">{{ error }}</div>

      <form (ngSubmit)="login()" #f="ngForm" autocomplete="off">
        <div class="form-group">
          <label class="form-label">Username</label>
          <input class="form-control" type="text" [(ngModel)]="username" name="username"
                 placeholder="Enter your username" autocomplete="off" required>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input class="form-control" type="password" [(ngModel)]="password" name="password"
                 placeholder="Enter your password" autocomplete="new-password" required>
        </div>
        <button class="btn btn-primary login-btn" type="submit" [disabled]="loading">
          <span *ngIf="loading" class="btn-spinner"></span>
          {{ loading ? 'Signing in...' : 'Sign In' }}
        </button>
      </form>
    </div>

    <div class="demo-creds">
      <p class="demo-title">Demo Credentials</p>
      <div class="cred-list">
        <div class="cred-item" (click)="username='admin'; password='Admin@1234'">
          <span class="badge badge-admin">ADMIN</span>
          <span>admin / Admin&#64;1234</span>
        </div>
        <div class="cred-item" (click)="username='manager1'; password='Admin@1234'">
          <span class="badge badge-manager">MANAGER</span>
          <span>manager1 / Admin&#64;1234</span>
        </div>
        <div class="cred-item" (click)="username='viewer1'; password='Admin@1234'">
          <span class="badge badge-viewer">VIEWER</span>
          <span>viewer1 / Admin&#64;1234</span>
        </div>
      </div>
    </div>
  </div>
</div>
