spring.application.name=asset-management

# Database (PostgreSQL)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/assetmgmt}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:Thanvi@9626}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Flyway
spring.flyway.enabled=false
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.locations=classpath:db/migration

# JWT
app.jwt.secret=${JWT_SECRET:assetMgmtSecretKey2024VeryLongSecretKey!@#$%^&*}
app.jwt.expiration=${JWT_EXPIRATION:86400000}

# CORS
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost,http://localhost:80,http://localhost:4200}

# Server
server.port=8080
server.error.include-message=always
server.error.include-binding-errors=always

# Logging
logging.level.com.assetmgmt=INFO
logging.level.org.springframework.security=WARN

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=15MB
app.upload.dir=uploads
# Gemini AI
gemini.api.key=${GEMINI_API_KEY:AIzaSyDrgOPTvBpCi2zSZzGnsf-5UpveFPDjKgA}
gemini.model.name=${GEMINI_MODEL:gemini-flash-latest}
